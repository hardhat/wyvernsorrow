<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyvern Sorrow - Map Editor</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #212529;
            /* Dark background */
            color: #f8f9fa;
            /* Light text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1,
        h2 {
            font-weight: 300;
            color: #ffca28;
            /* Gold accent */
        }

        .accent-color {
            color: #ffca28;
        }

        .editor-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .palette-panel {
            width: 250px;
            background-color: #343a40;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .main-editor {
            flex-grow: 1;
            background-color: #343a40;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .property-panel {
            width: 250px;
            background-color: #343a40;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            height: fit-content;
        }

        .canvas-container {
            position: relative;
            background-color: #000;
            border: 2px solid #6c757d;
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        canvas {
            image-rendering: pixelated;
            /* Crucial for crisp pixel art */
            cursor: crosshair;
            display: block;
            /* Removes bottom margin gap */
        }

        /* Tile presentation inside the palette */
        .tile-option {
            width: 38px;
            /* Slightly larger than 32px to account for border */
            height: 38px;
            display: inline-block;
            margin: 4px;
            border: 2px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            transition: transform 0.1s ease-in-out;
        }

        .tile-option:hover {
            transform: scale(1.1);
        }

        .tile-option.selected {
            border-color: #ffca28;
            box-shadow: 0 0 8px rgba(255, 202, 40, 0.8);
            transform: scale(1.1);
            z-index: 10;
        }

        /* Inner div to display the actual sprite slice from the tileset image */
        .tile-sprite {
            width: 32px;
            /* Visual size of the tile option */
            height: 32px;
            image-rendering: pixelated;
            background-image: url('/img/terrain.gif');
            /* CSS background-size: 
               The original image is 7x4 tiles of 16px = 112px x 64px.
               Since we're scaling up to 32px visually, it's a 2x scale: 224px x 128px
            */
            background-size: 224px 128px;
            margin: 1px;
        }

        /* Tooltip style */
        .tile-option[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: 50%;
            top: -30px;
            transform: translateX(-50%);
            background: #000;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 20;
            pointer-events: none;
        }

        .controls-top {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        /* Custom styling for the select dropdown in dark mode */
        .form-select {
            background-color: #495057;
            color: #fff;
            border-color: #6c757d;
        }

        .form-select:focus {
            background-color: #495057;
            color: #fff;
            border-color: #ffca28;
            box-shadow: 0 0 0 0.25rem rgba(255, 202, 40, 0.25);
        }

        #statusMessage {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #statusMessage.show {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <header class="py-3 border-bottom border-secondary mb-4">
            <div class="d-flex align-items-center justify-content-between">
                <h1 class="h3 m-0">Wyvern Sorrow <span class="accent-color">Map Editor</span></h1>
                <div class="d-flex align-items-center gap-3">
                    <span id="statusMessage" class="badge rounded-pill bg-success px-3 py-2">Saved successfully</span>
                    <button id="saveBtn" class="btn btn-warning fw-bold px-4">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                            class="bi bi-floppy me-2" viewBox="0 0 16 16">
                            <path d="M11 2H9v3h2z" />
                            <path
                                d="M1.5 0h11.586a1.5 1.5 0 0 1 1.06.44l1.415 1.414A1.5 1.5 0 0 1 16 2.914V14.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 0 14.5v-13A1.5 1.5 0 0 1 1.5 0M1 1.5v13a.5.5 0 0 0 .5.5H2v-4.5A1.5 1.5 0 0 1 3.5 9h9a1.5 1.5 0 0 1 1.5 1.5V15h.5a.5.5 0 0 0 .5-.5V2.914a.5.5 0 0 0-.146-.353l-1.415-1.415A.5.5 0 0 0 13.086 1H13v4.5A1.5 1.5 0 0 1 11.5 7h-7A1.5 1.5 0 0 1 3 5.5V1H1.5a.5.5 0 0 0-.5.5m3 4a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 .5-.5V1H4zM3 15h10v-4.5a.5.5 0 0 0-.5-.5h-9a.5.5 0 0 0-.5.5z" />
                        </svg>
                        Save All Maps
                    </button>
                </div>
            </div>
        </header>

        <div class="editor-container">
            <!-- Sidebar Palette -->
            <aside class="palette-panel d-flex flex-column gap-3">
                <div>
                    <input type="radio" class="btn-check" name="modeRadio" id="modeTerrain" autocomplete="off" checked>
                    <label class="btn btn-outline-primary w-100 mb-2" for="modeTerrain">Terrain Mode</label>

                    <input type="radio" class="btn-check" name="modeRadio" id="modeEntity" autocomplete="off">
                    <label class="btn btn-outline-danger w-100" for="modeEntity">Entities Mode</label>
                </div>

                <h5 id="paletteTitle" class="mb-2 border-bottom border-secondary pb-2">Terrain Palette</h5>
                <div id="paletteContainer" class="d-flex flex-wrap">
                    <!-- Tiles injected here via JS -->
                </div>
            </aside>

            <!-- Main Editing Area -->
            <main class="main-editor">
                <div class="controls-top">
                    <div class="d-flex align-items-center gap-2 w-50">
                        <label for="mapSelect" class="form-label mb-0 fw-bold text-nowrap">Edit Map:</label>
                        <select id="mapSelect" class="form-select w-100">
                            <!-- Options injected via JS -->
                        </select>
                    </div>

                    <div class="btn-group" role="group" aria-label="Zoom controls">
                        <input type="radio" class="btn-check" name="btnradio" id="zoom1" autocomplete="off">
                        <label class="btn btn-outline-warning text-white" for="zoom1">x1</label>

                        <input type="radio" class="btn-check" name="btnradio" id="zoom2" autocomplete="off" checked>
                        <label class="btn btn-outline-warning text-white" for="zoom2">x2</label>

                        <input type="radio" class="btn-check" name="btnradio" id="zoom3" autocomplete="off">
                        <label class="btn btn-outline-warning text-white" for="zoom3">x3</label>
                    </div>
                </div>

                <div class="canvas-container" id="canvasWrapper">
                    <!-- The canvas is 20x15 tiles * 16px visually scaled via CSS -->
                    <canvas id="mapCanvas" width="320" height="240"></canvas>
                </div>
            </main>

            <!-- Right Property Panel (Hidden by default) -->
            <aside class="property-panel" id="entityProperties" style="display:none;">
                <h5 class="mb-3 border-bottom border-secondary pb-2">Entity Properties</h5>
                <div class="mb-2">
                    <label class="form-label mb-1 small text-muted">ID (Macro):</label>
                    <input type="text" id="entId"
                        class="form-control form-control-sm bg-dark text-white border-secondary" placeholder="WNPC_...">
                </div>
                <div class="mb-3">
                    <label class="form-label mb-1 small text-muted">Type:</label>
                    <select id="entType" class="form-select form-select-sm bg-dark text-white border-secondary">
                        <option value="WTYPE_ACTOR">WTYPE_ACTOR</option>
                        <option value="WTYPE_BOSS">WTYPE_BOSS</option>
                        <option value="WTYPE_ITEM">WTYPE_ITEM</option>
                        <option value="WTYPE_TRIGGER">WTYPE_TRIGGER</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label mb-1 small text-muted">Flags:</label>
                    <div class="form-check"><input type="checkbox" class="form-check-input ent-flag"
                            value="WFLAG_VISIBLE" id="fVis"><label class="form-check-label small"
                            for="fVis">Visible</label></div>
                    <div class="form-check"><input type="checkbox" class="form-check-input ent-flag"
                            value="WFLAG_INTERACTABLE" id="fInt"><label class="form-check-label small"
                            for="fInt">Interactable</label></div>
                    <div class="form-check"><input type="checkbox" class="form-check-input ent-flag"
                            value="WFLAG_CAPTIVE" id="fCap"><label class="form-check-label small"
                            for="fCap">Captive</label></div>
                    <div class="form-check"><input type="checkbox" class="form-check-input ent-flag"
                            value="WFLAG_DEFEATED" id="fDef"><label class="form-check-label small"
                            for="fDef">Defeated</label></div>
                </div>
                <button id="deleteEntityBtn" class="btn btn-sm btn-outline-danger w-100">Delete Entity</button>
            </aside>
        </div>
    </div>

    <script>
        const TILE_START_ID = 18; // TILE_OVERMAP_GRASS is index 18
        const TILE_SHEET_COLS = 7;
        const TILE_SIZE = 16;
        const VISUAL_SCALE_PALETTE = 2; // Visually 32px
        const MAP_WIDTH = 20;
        const MAP_HEIGHT = 15;

        // State
        let currentMapName = "";
        let selectedTileName = "TILE_OVERMAP_GRASS";
        let selectedEntitySprite = null; // Used when placing new entities
        let selectedEntityInstance = null; // Used when selecting placed entities
        let currentMode = "terrain"; // "terrain" or "entity"

        let isDrawing = false;
        let mapsData = {}; // Contains map arrays fetched from backend
        let tileDefinitions = []; // Array of strings loaded from backend
        let entitiesData = {}; // Contains entity arrays per map
        let entitySprites = {}; // Contains the sprite definitions from backend
        let currentZoom = 2; // Default 2x zoom (32px tiles on canvas)

        // DOM Elements
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const mapSelect = document.getElementById('mapSelect');
        const paletteContainer = document.getElementById('paletteContainer');
        const saveBtn = document.getElementById('saveBtn');
        const statusMessage = document.getElementById('statusMessage');

        const modeTerrain = document.getElementById('modeTerrain');
        const modeEntity = document.getElementById('modeEntity');
        const paletteTitle = document.getElementById('paletteTitle');
        const entityProperties = document.getElementById('entityProperties');

        const entId = document.getElementById('entId');
        const entType = document.getElementById('entType');
        const entFlags = document.querySelectorAll('.ent-flag');
        const deleteEntityBtn = document.getElementById('deleteEntityBtn');

        // Load images
        const images = {
            terrain: new Image(),
            npc_pc: new Image(),
            enemies: new Image(),
            bosses: new Image(),
            demonlord: new Image()
        };
        images.terrain.src = '/img/terrain.gif';
        images.npc_pc.src = '/img/npc_pc.gif';
        images.enemies.src = '/img/enemies.gif';
        images.bosses.src = '/img/bosses.gif';
        images.demonlord.src = '/img/demonlord.gif';

        // ------------------------------------------------------------------------
        // Initialization & Data Loading
        // ------------------------------------------------------------------------

        async function init() {
            // Wait for all images to load
            const promises = Object.values(images).map(img => {
                return new Promise(resolve => {
                    if (img.complete) resolve();
                    else img.onload = resolve;
                });
            });
            await Promise.all(promises);

            loadData();
        }

        async function loadData() {
            try {
                const [mapRes, entRes] = await Promise.all([
                    fetch('/api/maps'),
                    fetch('/api/entities')
                ]);

                const mapData = await mapRes.json();
                const entData = await entRes.json();

                mapsData = mapData.maps;
                tileDefinitions = mapData.tiles;
                entitySprites = mapData.entity_sprites || {};
                entitiesData = entData;

                // Ensure every map has an entity array
                for (let mapName in mapsData) {
                    if (!entitiesData[mapName]) {
                        entitiesData[mapName] = [];
                    }
                }

                populateMapDropdown();
                buildPalette();
                setZoom(2); // Apply default zoom CSS

                if (Object.keys(mapsData).length > 0) {
                    currentMapName = mapSelect.value;
                    renderCanvas();
                }
            } catch (e) {
                console.error("Failed to load map data from server:", e);
            }
        }

        // ------------------------------------------------------------------------
        // Mode Switching & Palette
        // ------------------------------------------------------------------------

        modeTerrain.addEventListener('change', () => {
            currentMode = "terrain";
            paletteTitle.textContent = "Terrain Palette";
            entityProperties.style.display = 'none';
            selectedEntityInstance = null;
            buildPalette();
            renderCanvas();
        });

        modeEntity.addEventListener('change', () => {
            currentMode = "entity";
            paletteTitle.textContent = "Entity Palette";
            selectedEntityInstance = null;
            buildPalette();
            renderCanvas();
        });

        function buildPalette() {
            paletteContainer.innerHTML = '';

            if (currentMode === "terrain") {
                tileDefinitions.forEach((tileName, index) => {
                    const optionWrap = document.createElement('div');
                    optionWrap.className = 'tile-option';
                    if (tileName === selectedTileName) optionWrap.classList.add('selected');
                    optionWrap.title = tileName;
                    optionWrap.dataset.tileName = tileName;

                    const innerSprite = document.createElement('div');
                    innerSprite.className = 'tile-sprite';
                    const srcX = (index % TILE_SHEET_COLS) * TILE_SIZE;
                    const srcY = Math.floor(index / TILE_SHEET_COLS) * TILE_SIZE;
                    innerSprite.style.backgroundPosition = `-${srcX * VISUAL_SCALE_PALETTE}px -${srcY * VISUAL_SCALE_PALETTE}px`;
                    innerSprite.style.backgroundImage = "url('/img/terrain.gif')";

                    optionWrap.appendChild(innerSprite);
                    optionWrap.addEventListener('click', () => selectTile(tileName));
                    paletteContainer.appendChild(optionWrap);
                });
            } else {
                // Entity Mode
                for (const [sheetKey, sheetDef] of Object.entries(entitySprites)) {
                    sheetDef.sprites.forEach((spriteName, i) => {
                        if (!spriteName) return;

                        const optionWrap = document.createElement('div');
                        optionWrap.className = 'tile-option';
                        if (selectedEntitySprite && spriteName === selectedEntitySprite.name) optionWrap.classList.add('selected');
                        optionWrap.title = spriteName;

                        const innerSprite = document.createElement('div');
                        innerSprite.className = 'tile-sprite';
                        innerSprite.style.backgroundImage = `url('/img/${sheetKey}.gif')`;

                        const tw = sheetDef.tile_w || 16;
                        const th = sheetDef.tile_h || 16;
                        const visualScale = 32 / Math.max(tw, th);

                        innerSprite.style.width = (tw * visualScale) + "px";
                        innerSprite.style.height = (th * visualScale) + "px";

                        const sheetPixelWidth = (sheetDef.width * tw) * visualScale;
                        const sheetPixelHeight = (sheetDef.height * th) * visualScale;
                        innerSprite.style.backgroundSize = `${sheetPixelWidth}px ${sheetPixelHeight}px`;

                        const srcX = (i % sheetDef.width) * tw;
                        const srcY = Math.floor(i / sheetDef.width) * th;
                        innerSprite.style.backgroundPosition = `-${srcX * visualScale}px -${srcY * visualScale}px`;

                        optionWrap.appendChild(innerSprite);
                        optionWrap.addEventListener('click', () => {
                            selectedEntitySprite = { name: spriteName, sheet: sheetKey, index: i };
                            document.querySelectorAll('.tile-option').forEach(el => el.classList.remove('selected'));
                            optionWrap.classList.add('selected');
                        });
                        paletteContainer.appendChild(optionWrap);
                    });
                }
            }
        }

        function populateMapDropdown() {
            mapSelect.innerHTML = '';
            for (let mapName in mapsData) {
                const opt = document.createElement('option');
                opt.value = mapName;
                opt.textContent = mapName;
                mapSelect.appendChild(opt);
            }
            mapSelect.addEventListener('change', () => {
                currentMapName = mapSelect.value;
                selectedEntityInstance = null;
                entityProperties.style.display = 'none';
                renderCanvas();
            });
        }

        function selectTile(tileName) {
            selectedTileName = tileName;
            document.querySelectorAll('.tile-option').forEach(el => {
                if (el.dataset.tileName === tileName) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }

        // ------------------------------------------------------------------------
        // Rendering & Editing
        // ------------------------------------------------------------------------

        function setZoom(factor) {
            currentZoom = factor;
            // The logical canvas is always 320x240 (20x15 tiles * 16px).
            // We use CSS to scale it visually to handle zoom.
            canvas.style.width = `${MAP_WIDTH * TILE_SIZE * factor}px`;
            canvas.style.height = `${MAP_HEIGHT * TILE_SIZE * factor}px`;
        }

        document.getElementById('zoom1').addEventListener('change', () => setZoom(1));
        document.getElementById('zoom2').addEventListener('change', () => setZoom(2));
        document.getElementById('zoom3').addEventListener('change', () => setZoom(3));

        function getTileNameIndex(tileName) {
            return tileDefinitions.indexOf(tileName);
        }

        function renderCanvas() {
            if (!currentMapName || !mapsData[currentMapName]) return;

            // 1. Draw Terrain
            const grid = mapsData[currentMapName];
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < MAP_HEIGHT; y++) {
                for (let x = 0; x < MAP_WIDTH; x++) {
                    const cellTileName = grid[y][x];
                    drawTileOnCanvas(cellTileName, x, y);
                }
            }

            // 2. Draw Entities
            const ents = entitiesData[currentMapName] || [];
            ents.forEach(ent => {
                // Find which sheet this sprite belongs to
                let sheetKey = null;
                let spriteIndex = -1;
                let sheetDef = null;

                for (const [k, v] of Object.entries(entitySprites)) {
                    const idx = v.sprites.indexOf(ent.sprite);
                    if (idx !== -1) {
                        sheetKey = k;
                        spriteIndex = idx;
                        sheetDef = v;
                        break;
                    }
                }

                if (sheetKey && sheetDef) {
                    const img = images[sheetKey];
                    const tw = sheetDef.tile_w || 16;
                    const th = sheetDef.tile_h || 16;

                    const srcX = (spriteIndex % sheetDef.width) * tw;
                    const srcY = Math.floor(spriteIndex / sheetDef.width) * th;

                    // Draw sprite
                    ctx.drawImage(
                        img,
                        srcX, srcY, tw, th,
                        ent.x * TILE_SIZE, ent.y * TILE_SIZE, tw, th
                    );

                    // Draw selection box if selected
                    if (selectedEntityInstance === ent) {
                        ctx.strokeStyle = '#ffca28';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(ent.x * TILE_SIZE, ent.y * TILE_SIZE, tw, th);
                    }
                }
            });
        }

        function drawTileOnCanvas(tileName, gridX, gridY) {
            const spriteIndex = getTileNameIndex(tileName);
            if (spriteIndex === -1) {
                // Unrecognized tile (maybe a macro we didn't export), draw purple placeholder
                ctx.fillStyle = '#ff00ff';
                ctx.fillRect(gridX * TILE_SIZE, gridY * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                return;
            }

            const srcX = (spriteIndex % TILE_SHEET_COLS) * TILE_SIZE;
            const srcY = Math.floor(spriteIndex / TILE_SHEET_COLS) * TILE_SIZE;

            ctx.drawImage(
                images.terrain,
                srcX, srcY, TILE_SIZE, TILE_SIZE,
                gridX * TILE_SIZE, gridY * TILE_SIZE, TILE_SIZE, TILE_SIZE
            );
        }

        // Mouse Interaction
        function paint(e) {
            if (!isDrawing || !currentMapName) return;

            // Calculate canvas coordinates taking CSS scaling into account
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;

            const gridX = Math.floor(mouseX / TILE_SIZE);
            const gridY = Math.floor(mouseY / TILE_SIZE);

            if (gridX >= 0 && gridX < MAP_WIDTH && gridY >= 0 && gridY < MAP_HEIGHT) {
                if (currentMode === "terrain") {
                    if (mapsData[currentMapName][gridY][gridX] !== selectedTileName) {
                        mapsData[currentMapName][gridY][gridX] = selectedTileName;
                        renderCanvas(); // Re-render everything to be safe
                    }
                }
                // (Entity placement is handled in mousedown to avoid drag-spamming entities)
            }
        }

        canvas.addEventListener('mousedown', (e) => {
            if (!currentMapName) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const gridX = Math.floor(((e.clientX - rect.left) * scaleX) / TILE_SIZE);
            const gridY = Math.floor(((e.clientY - rect.top) * scaleY) / TILE_SIZE);

            if (currentMode === "terrain") {
                isDrawing = true;
                paint(e);
            } else if (currentMode === "entity" && gridX >= 0 && gridX < MAP_WIDTH && gridY >= 0 && gridY < MAP_HEIGHT) {
                // 1. Check if we clicked an existing entity
                const ents = entitiesData[currentMapName];
                const clickedEnt = ents.find(ent => ent.x === gridX && ent.y === gridY);

                if (clickedEnt) {
                    selectedEntityInstance = clickedEnt;
                    bindEntityProperties();
                    renderCanvas();
                } else if (selectedEntitySprite) {
                    // 2. Place a new entity
                    const newEnt = {
                        id: "WNPC_NEW",
                        type: "WTYPE_ACTOR",
                        flags: ["WFLAG_VISIBLE"],
                        sprite: selectedEntitySprite.name,
                        x: gridX,
                        y: gridY
                    };
                    ents.push(newEnt);
                    selectedEntityInstance = newEnt;
                    bindEntityProperties();
                    renderCanvas();
                } else {
                    // Deselect
                    selectedEntityInstance = null;
                    entityProperties.style.display = 'none';
                    renderCanvas();
                }
            }
        });

        window.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (currentMode === "terrain") paint(e);
        });

        // ------------------------------------------------------------------------
        // Property Panel Binding
        // ------------------------------------------------------------------------

        function bindEntityProperties() {
            if (!selectedEntityInstance) {
                entityProperties.style.display = 'none';
                return;
            }

            entityProperties.style.display = 'block';
            entId.value = selectedEntityInstance.id || "";
            entType.value = selectedEntityInstance.type || "WTYPE_ACTOR";

            const flags = selectedEntityInstance.flags || [];
            entFlags.forEach(cb => {
                cb.checked = flags.includes(cb.value);
            });
        }

        function updateSelectedEntity() {
            if (!selectedEntityInstance) return;

            selectedEntityInstance.id = entId.value;
            selectedEntityInstance.type = entType.value;

            const activeFlags = [];
            entFlags.forEach(cb => {
                if (cb.checked) activeFlags.push(cb.value);
            });
            selectedEntityInstance.flags = activeFlags;
        }

        entId.addEventListener('input', updateSelectedEntity);
        entType.addEventListener('change', updateSelectedEntity);
        entFlags.forEach(cb => cb.addEventListener('change', updateSelectedEntity));

        deleteEntityBtn.addEventListener('click', () => {
            if (!selectedEntityInstance || !currentMapName) return;
            const ents = entitiesData[currentMapName];
            const idx = ents.indexOf(selectedEntityInstance);
            if (idx !== -1) {
                ents.splice(idx, 1);
            }
            selectedEntityInstance = null;
            entityProperties.style.display = 'none';
            renderCanvas();
        });

        // Prevent dragging the canvas element
        canvas.addEventListener('dragstart', (e) => e.preventDefault());

        // ------------------------------------------------------------------------
        // Saving
        // ------------------------------------------------------------------------

        saveBtn.addEventListener('click', async () => {
            try {
                saveBtn.disabled = true;

                const [mapSaveRes, entSaveRes] = await Promise.all([
                    fetch('/api/maps', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ maps: mapsData })
                    }),
                    fetch('/api/entities', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(entitiesData)
                    })
                ]);

                if (mapSaveRes.ok && entSaveRes.ok) {
                    statusMessage.className = "badge rounded-pill bg-success px-3 py-2 show";
                    statusMessage.textContent = "Saved successfully!";
                } else {
                    statusMessage.className = "badge rounded-pill bg-danger px-3 py-2 show";
                    statusMessage.textContent = "Save failed (Check terminal)";
                }

                setTimeout(() => {
                    statusMessage.classList.remove('show');
                }, 3000);

            } catch (e) {
                console.error(e);
            } finally {
                saveBtn.disabled = false;
            }
        });

        // Go!
        init();

    </script>
    <!-- Bootstrap JS (optional for simple UI, included for completeness) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
